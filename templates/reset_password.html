{% extends 'base2.html' %}
{% block content %}
<div class="auth-card">
  <h2>Reset Password</h2>
  <p class="sub">Enter the OTP sent to your email and choose a new password.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/reset-password">
    <div class="form-group">
      <label>OTP</label>
      <input type="text" name="otp" maxlength="6" placeholder="6-digit code" required autofocus>
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" name="password" minlength="6" placeholder="Min. 6 characters" required>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm_password" minlength="6" placeholder="Repeat password" required>
    </div>

    <button type="submit" class="btn-primary">Reset Password</button>
  </form>

  <p class="back-link"><a href="/forgot-password">← Try a different email</a></p>
</div>
{% endblock %}
