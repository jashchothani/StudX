{% extends 'base2.html' %}
{% block title %}Reset Password{% endblock %}
{% block extra_head %}
<style>
body{display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-wrap{width:100%;max-width:420px;padding:24px;animation:fadeUp .5s ease}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.auth-logo{width:72px;height:72px;background:linear-gradient(135deg,#dc2626,var(--danger));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 24px;animation:float 3s ease-in-out infinite}
.auth-title{font-size:1.5rem;font-weight:800;color:#fff;text-align:center;margin-bottom:8px}
.auth-sub{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:28px}
.back-link{text-align:center;margin-top:16px;font-size:.82rem;color:var(--muted)}
.back-link a{color:var(--primary-light);font-weight:600}
.resend-row{text-align:center;margin-top:16px;font-size:.82rem;color:var(--muted)}
.resend-row button{background:none;border:none;color:var(--primary-light);font-weight:600;cursor:pointer;font-size:.82rem;padding:4px 8px;border-radius:6px;transition:.2s}
.resend-row button:hover{background:rgba(109,40,217,.1)}
.resend-row button:disabled{color:var(--muted);cursor:not-allowed}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🔒</div>
    <div class="auth-title">Reset Password</div>
    <div class="auth-sub">Enter the OTP sent to your email and choose a new password.</div>
    <form method="POST" action="/reset-password">
      <div class="form-group">
        <label class="form-label">OTP Code</label>
        <input type="text" name="otp" class="form-control" maxlength="6" placeholder="6-digit code"
               required autofocus style="font-family:var(--mono);font-size:1.3rem;letter-spacing:.2em;text-align:center">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" minlength="6" placeholder="Min. 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" minlength="6" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">
        <i class="fa-solid fa-lock-open"></i> Reset Password
      </button>
    </form>
    <div class="resend-row">
      Didn't receive it?
      <button id="resend-btn" onclick="resendOtp()">Resend OTP</button>
    </div>
    <div class="back-link"><a href="/forgot-password">← Try a different email</a></div>
  </div>
</div>
{% endblock %}
