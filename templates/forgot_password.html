{% extends 'base2.html' %}
{% block title %}Forgot Password{% endblock %}
{% block extra_head %}
<style>
body{display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-wrap{width:100%;max-width:420px;padding:24px;animation:fadeUp .5s ease}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.auth-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 24px;animation:float 3s ease-in-out infinite}
.auth-title{font-size:1.5rem;font-weight:800;color:#fff;text-align:center;margin-bottom:8px}
.auth-sub{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.6}
.back-link{text-align:center;margin-top:20px;font-size:.82rem;color:var(--muted)}
.back-link a{color:var(--primary-light);font-weight:600}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <div class="auth-title">Forgot Password</div>
    <div class="auth-sub">Enter your registered email and we'll send you an OTP to reset your password.</div>
    <form method="POST" action="/forgot-password">
      <div class="form-group">
        <label class="form-label">Portal</label>
        <select name="portal" class="form-control" required>
          <option value="student">🎓 Student</option>
          <option value="parent">👨‍👩‍👧 Parent</option>
          <option value="staff">🏫 Staff / Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Registered Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@gmail.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">
        <i class="fa-solid fa-paper-plane"></i> Send Reset OTP
      </button>
    </form>
    <div class="back-link mt-2"><a href="/login">← Back to Login</a></div>
  </div>
</div>
{% endblock %}
